name: Release plugin

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:

# The marketplace repo that publishes this plugin. The release job opens a PR
# here bumping the plugin's pinned tag. Change if the marketplace repo is renamed.
env:
  MARKETPLACE_REPO: pingvinen/claude-plugins
  PLUGIN_NAME: pingvinen-ev-search
  ASSIGNEE: pingvinen
  PUBLISH_LABEL: release

jobs:
  # ====================================================================
  # Cut the release: bump plugin.json version, tag vX.Y.Z, GitHub Release
  # ====================================================================
  release:
    runs-on: ubuntu-latest
    outputs:
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        with:
          # exec (writes the version into plugin.json) and git (commits it back so
          # the tag includes the bumped version) are not bundled with core.
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN_PAT }}

  # ====================================================================
  # Publish: PR the marketplace repo to pin this plugin to the new tag
  # ====================================================================
  publish-to-marketplace:
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout marketplace repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.MARKETPLACE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN_PAT }}

      - name: Pin plugin to the new release tag
        run: |
          ref="v${{ needs.release.outputs.new-release-version }}"
          jq --arg name "$PLUGIN_NAME" --arg ref "$ref" \
            '(.plugins[] | select(.name == $name).source.ref) = $ref' \
            .claude-plugin/marketplace.json > marketplace.json.tmp
          mv marketplace.json.tmp .claude-plugin/marketplace.json
          echo "Pinned $PLUGIN_NAME to $ref"

      - name: Open publish PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN_PAT }}
          assignees: ${{ env.ASSIGNEE }}
          labels: ${{ env.PUBLISH_LABEL }}
          branch: publish/${{ env.PLUGIN_NAME }}-v${{ needs.release.outputs.new-release-version }}
          title: "Publish ${{ env.PLUGIN_NAME }} v${{ needs.release.outputs.new-release-version }}"
          commit-message: "chore: pin ${{ env.PLUGIN_NAME }} to v${{ needs.release.outputs.new-release-version }}"
          body: |
            Automated release PR.

            Pins `${{ env.PLUGIN_NAME }}` to tag
            `v${{ needs.release.outputs.new-release-version }}`
            (from ${{ github.repository }}). Merging publishes the new version to
            marketplace users.
